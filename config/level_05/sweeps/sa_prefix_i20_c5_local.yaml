# Manual sensitivity sweep: 8 parameter sets × 3 seeded source runs.
# Run manually: python scripts/run_parameter_sweep.py --config config/level_05/sweeps/sa_prefix_i20_c5_local.yaml
project:
  level_id: level_05
  algorithm_id: extreme_point_simulated_annealing

base_config: config/level_05/default.yaml

instance:
  item_counts: [20]
  container_counts: [5]
  item_selection_strategy: prefix

execution:
  environment: local
  seeds: [7, 11, 19]
  repeats: 1

sweep:
  max_parameter_sets: 8
  parameters:
    max_iterations: [50, 200]
    initial_temperature: [0.05, 0.25]
    cooling_rate: [0.95, 0.99]
