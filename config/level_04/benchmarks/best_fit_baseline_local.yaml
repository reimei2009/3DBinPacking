# Promotion gate for the practical Level 4 stackability-aware Best Fit solver.
# Run manually: python scripts\run_benchmark.py --suite config\level_04\benchmarks\best_fit_baseline_local.yaml
suite_id: level_04_best_fit_baseline_local_v1
level_id: level_04
description: >
  Validate deterministic stackability-aware Extreme Point Best Fit under the
  Level 4 exact-support and direct-parent stackability contract. Repeats test
  reproducibility, not random-search diversity.
config: config/level_04/default.yaml
environment: local
algorithms: [extreme_point_best_fit]
seeds: [42]
repeats: 3
scenarios:
  - scenario_id: sanity_prefix_i3_c2
    description: "Short stackability-aware Best Fit smoke baseline."
    item_count: 3
    container_count: 2
    item_selection: prefix
    algorithms: [extreme_point_best_fit]
    tags: [smoke, deterministic, horizontal_orientation, support, stackability]

  - scenario_id: practical_prefix_i10_c3
    description: "Small practical Level 4 baseline; run manually."
    item_count: 10
    container_count: 3
    item_selection: prefix
    algorithms: [extreme_point_best_fit]
    tags: [practical, horizontal_orientation, support, stackability]

  - scenario_id: practical_prefix_i20_c5
    description: "Practical prefix instance; run manually."
    item_count: 20
    container_count: 5
    item_selection: prefix
    algorithms: [extreme_point_best_fit]
    tags: [practical, horizontal_orientation, support, stackability]

  - scenario_id: stable_random_101_i20_c5
    description: "Stable random stackability profile with selection seed 101; run manually."
    item_count: 20
    container_count: 5
    item_selection: stable_random
    selection_seed: 101
    algorithms: [extreme_point_best_fit]
    tags: [practical, stable_random, horizontal_orientation, support, stackability]

  - scenario_id: diverse_volume_i40_c8
    description: "Volume-diverse scale profile; run manually."
    item_count: 40
    container_count: 8
    item_selection: volume_stratified
    algorithms: [extreme_point_best_fit]
    tags: [scale, volume_diverse, horizontal_orientation, support, stackability]

  - scenario_id: scale_prefix_i100_c12
    description: "Large deterministic scale profile; run manually."
    item_count: 100
    container_count: 12
    item_selection: prefix
    algorithms: [extreme_point_best_fit]
    tags: [scale, large, horizontal_orientation, support, stackability]
