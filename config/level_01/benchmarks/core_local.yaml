# Fair Level 1 comparison protocol. Every listed algorithm runs every scenario.
suite_id: level_01_core_local_v1
level_id: level_01
description: >
  Local CPU benchmark for the Level 1 fixed-orientation, geometry-and-payload
  contract. Do not compare its rows with a different level or input fingerprint.
config: config/level_01/default.yaml
environment: local
algorithms:
  - extreme_point_ffd
  - extreme_point_best_fit
  - maximal_space_best_fit
  - extreme_point_hill_climbing
  - extreme_point_simulated_annealing
  - milp_big_m
seeds: [7, 11, 19]
repeats: 1
scenarios:
  - scenario_id: small_i10_c3
    description: "Small exact-reference case: 10 items and 3 candidate containers."
    item_count: 10
    container_count: 3
    tags: [small, exact_reference, heterogeneous_containers]
  - scenario_id: medium_i20_c5
    description: "Default Level 1 case: 20 items and 5 candidate containers."
    item_count: 20
    container_count: 5
    tags: [medium, default, heterogeneous_containers]
  - scenario_id: large_i40_c8
    description: "Larger local-CPU case: 40 items and 8 candidate containers."
    item_count: 40
    container_count: 8
    tags: [large, scalability, heterogeneous_containers]
